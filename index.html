<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descarga la App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      text-align: center;
      padding: 20px;
    }
    .logo { font-size: 64px; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 700; }
    p { color: #aaa; font-size: 15px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ios { background: #007AFF; color: #fff; }
    .btn-android { background: #01875f; color: #fff; }
    .btn-web { background: #333; color: #fff; }
    #manual { display: none; }
  </style>
</head>
<body>

  <div class="logo">📱</div>
  <h1 id="title">Redirigiendo...</h1>
  <p id="subtitle">Detectando tu dispositivo</p>
  <div class="spinner" id="spinner"></div>

  <div id="manual">
    <p style="margin-bottom:16px">Elige tu tienda:</p>
    <a class="btn btn-ios" id="ios-btn" href="#">🍎 App Store (iOS)</a>
    <a class="btn btn-android" id="android-btn" href="#">▶ Google Play (Android)</a>
    <br>
    <a class="btn btn-web" id="web-btn" href="#" style="margin-top:8px">🌐 Versión Web</a>
  </div>

  <script>
    // ══════════════════════════════════════════════
    //  CONFIGURA AQUÍ TUS URLs
    // ══════════════════════════════════════════════
    const CONFIG = {
      ios:     "https://apps.apple.com/app/idTU_APP_ID",       // ← URL App Store
      android: "https://play.google.com/store/apps/details?id=com.tu.app", // ← URL Play Store
      web:     "https://tuapp.com"                              // ← URL web (fallback)
    };
    // ══════════════════════════════════════════════

    function getOS() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
      if (/android/i.test(ua)) return 'android';
      return 'other';
    }

    function redirect() {
      const os = getOS();
      const iosBtn     = document.getElementById('ios-btn');
      const androidBtn = document.getElementById('android-btn');
      const webBtn     = document.getElementById('web-btn');

      iosBtn.href     = CONFIG.ios;
      androidBtn.href = CONFIG.android;
      webBtn.href     = CONFIG.web;

      if (os === 'ios') {
        document.getElementById('title').textContent    = '¡Abriendo App Store!';
        document.getElementById('subtitle').textContent = 'Serás redirigido en un momento...';
        setTimeout(() => { window.location.href = CONFIG.ios; }, 1500);

      } else if (os === 'android') {
        document.getElementById('title').textContent    = '¡Abriendo Google Play!';
        document.getElementById('subtitle').textContent = 'Serás redirigido en un momento...';
        setTimeout(() => { window.location.href = CONFIG.android; }, 1500);

      } else {
        // Desktop u otro: mostrar opciones manuales
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent    = 'Descarga la aplicación';
        document.getElementById('subtitle').textContent = 'Selecciona tu plataforma:';
        document.getElementById('manual').style.display = 'block';
      }
    }

    redirect();
  </script>
</body>
</html>
